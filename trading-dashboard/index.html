<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MarketDash" />
  <title>MarketDash</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <div class="brand"><span class="logo">↗</span><span>MarketDash</span></div>
      <div class="search-box">
        <input id="symbolInput" value="7203.T" placeholder="銘柄を検索（例：7203.T、AAPL、bitcoin）" />
        <button id="loadBtn">表示</button>
      </div>
      <div class="status"><span id="updatedAt">--:--:--</span><span class="dot"></span></div>
    </header>

    <main class="layout">
      <aside class="left-panel card">
        <div class="panel-title">ウォッチリスト</div>
        <div id="watchlist" class="watchlist"></div>
      </aside>

      <section class="center-panel">
        <div class="tabs">
          <button class="tab active" data-market="jp">🇯🇵 日本株</button>
          <button class="tab" data-market="us">🇺🇸 米国株</button>
          <button class="tab" data-market="crypto">₿ 仮想通貨</button>
        </div>

        <section class="chart-card card">
          <div class="chart-head">
            <div>
              <div id="assetName" class="asset-name">7203.T トヨタ自動車</div>
              <div id="priceLine" class="price-line">デモチャート表示中</div>
            </div>
            <div class="chart-actions">
              <button id="range1m">1ヶ月</button>
              <button id="range6m">6ヶ月</button>
              <button id="range1y">1年</button>
            </div>
          </div>
          <div id="chart" class="chart"></div>
        </section>

        <section class="grid-3">
          <div class="mini-card card">
            <div class="panel-title">信用買い残</div>
            <div class="big green" id="marginBuy">3,562,400株</div>
            <canvas id="buyCanvas"></canvas>
          </div>
          <div class="mini-card card">
            <div class="panel-title">信用売り残</div>
            <div class="big red" id="marginSell">1,287,600株</div>
            <canvas id="sellCanvas"></canvas>
          </div>
          <div class="mini-card card">
            <div class="panel-title">貸株残</div>
            <div class="big blue" id="loanBalance">2,145,200株</div>
            <canvas id="loanCanvas"></canvas>
          </div>
        </section>
      </section>

      <aside class="right-panel">
        <section class="card feed-card">
          <div class="panel-title">X / SNS</div>
          <div id="snsFeed" class="feed"></div>
          <a id="xSearch" class="link-btn" target="_blank" rel="noopener">Xで検索結果を開く →</a>
        </section>

        <section class="card news-card">
          <div class="panel-title">ニュース</div>
          <div id="newsFeed" class="news"></div>
          <a id="googleNews" class="link-btn" target="_blank" rel="noopener">Googleニュースで検索 →</a>
        </section>

        <section class="card crypto-card">
          <div class="panel-title">仮想通貨</div>
          <div id="cryptoList" class="crypto-list"></div>
        </section>
      </aside>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
