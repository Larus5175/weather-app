<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>天気予報</title>

    <meta name="theme-color" content="#4da3ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="天気予報" />

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
            background: #f2f7ff;
            color: #1f2d3d;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(180deg, #66b3ff 0%, #9fd0ff 28%, #eef6ff 100%);
        }

        .app {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            padding:
                calc(env(safe-area-inset-top, 0px) + 18px)
                16px
                calc(env(safe-area-inset-bottom, 0px) + 24px);
        }

        .header {
            text-align: center;
            margin-bottom: 18px;
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.12);
            margin: 0;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.95);
        }

        .card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 14px 40px rgba(38, 89, 140, 0.18);
            padding: 16px;
        }

        .search-card {
            margin-bottom: 16px;
        }

        .search-row {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 16px;
            padding: 0 14px;
            font-size: 16px;
            background: #ffffff;
            box-shadow: inset 0 0 0 1px #d8e7f7;
            outline: none;
        }

        .search-input:focus {
            box-shadow: inset 0 0 0 2px #67adff;
        }

        .search-button {
            min-width: 90px;
            height: 48px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(180deg, #4da3ff 0%, #2e88f0 100%);
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 18px rgba(77, 163, 255, 0.28);
        }

        .search-button:active {
            transform: scale(0.98);
        }

        .message {
            min-height: 22px;
            margin-top: 10px;
            font-size: 14px;
            color: #d33c3c;
        }

        .weather-card {
            display: none;
        }

        .weather-card.show {
            display: block;
        }

        .location {
            text-align: center;
            margin-top: 4px;
        }

        .location-name {
            font-size: 28px;
            font-weight: 700;
            color: #1d3557;
        }

        .location-sub {
            margin-top: 4px;
            font-size: 14px;
            color: #6d8299;
        }

        .icon-area {
            text-align: center;
            margin-top: 16px;
            font-size: 56px;
            line-height: 1;
        }

        .weather-text {
            text-align: center;
            margin-top: 10px;
            font-size: 18px;
            font-weight: 700;
            color: #24507a;
        }

        .temp {
            text-align: center;
            margin-top: 8px;
            font-size: 56px;
            font-weight: 700;
            color: #0f3f67;
            line-height: 1;
        }

        .time-text {
            text-align: center;
            margin-top: 8px;
            font-size: 13px;
            color: #72859b;
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 18px;
        }

        .detail-box {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 18px;
            padding: 14px 12px;
            box-shadow: inset 0 0 0 1px #e4edf7;
        }

        .detail-title {
            font-size: 13px;
            color: #72859b;
            margin-bottom: 6px;
        }

        .detail-value {
            font-size: 22px;
            font-weight: 700;
            color: #163a5b;
        }

        .footer-note {
            margin-top: 16px;
            text-align: center;
            font-size: 12px;
            color: #7a8ea5;
        }

        .install-guide {
            margin-top: 16px;
            font-size: 13px;
            line-height: 1.7;
            color: #5f748d;
        }

        @media (max-width: 390px) {
            .title {
                font-size: 28px;
            }

            .temp {
                font-size: 50px;
            }

            .details {
                grid-template-columns: 1fr;
            }

            .search-button {
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1 class="title">天気予報</h1>
            <div class="subtitle">iPhoneでアプリっぽく使える天気アプリ</div>
        </div>

        <div class="card search-card">
            <div class="search-row">
                <input id="cityInput" class="search-input" type="text" placeholder="都市名 例：福岡市、東京、大阪" />
                <button id="searchButton" class="search-button">検索</button>
            </div>
            <div id="message" class="message"></div>
        </div>

        <div id="weatherCard" class="card weather-card">
            <div class="location">
                <div id="locationName" class="location-name">-</div>
                <div id="locationSub" class="location-sub">-</div>
            </div>

            <div id="weatherIcon" class="icon-area">??</div>
            <div id="weatherText" class="weather-text">-</div>
            <div id="temp" class="temp">-</div>
            <div id="timeText" class="time-text">-</div>

            <div class="details">
                <div class="detail-box">
                    <div class="detail-title">最高気温</div>
                    <div id="tempMax" class="detail-value">-</div>
                </div>
                <div class="detail-box">
                    <div class="detail-title">最低気温</div>
                    <div id="tempMin" class="detail-value">-</div>
                </div>
                <div class="detail-box">
                    <div class="detail-title">降水確率</div>
                    <div id="rainChance" class="detail-value">-</div>
                </div>
                <div class="detail-box">
                    <div class="detail-title">風速</div>
                    <div id="windSpeed" class="detail-value">-</div>
                </div>
            </div>

            <div class="footer-note">都市名で検索して現在の天気と今日の予報を表示します</div>
        </div>

        <div class="card install-guide">
            <strong>iPhoneで使う方法</strong><br>
            Safariでこのページを開く → 共有 → ホーム画面に追加<br>
            するとホーム画面からアプリっぽく開けます。
        </div>
    </div>

    <script>
        const cityInput = document.getElementById("cityInput");
        const searchButton = document.getElementById("searchButton");
        const message = document.getElementById("message");
        const weatherCard = document.getElementById("weatherCard");

        const locationName = document.getElementById("locationName");
        const locationSub = document.getElementById("locationSub");
        const weatherIcon = document.getElementById("weatherIcon");
        const weatherText = document.getElementById("weatherText");
        const temp = document.getElementById("temp");
        const timeText = document.getElementById("timeText");
        const tempMax = document.getElementById("tempMax");
        const tempMin = document.getElementById("tempMin");
        const rainChance = document.getElementById("rainChance");
        const windSpeed = document.getElementById("windSpeed");

        const weatherMap = {
            0: { text: "快晴", icon: "??" },
            1: { text: "晴れ", icon: "???" },
            2: { text: "晴れ時々くもり", icon: "?" },
            3: { text: "くもり", icon: "??" },
            45: { text: "霧", icon: "???" },
            48: { text: "霧", icon: "???" },
            51: { text: "弱い霧雨", icon: "???" },
            53: { text: "霧雨", icon: "???" },
            55: { text: "強い霧雨", icon: "???" },
            61: { text: "弱い雨", icon: "???" },
            63: { text: "雨", icon: "???" },
            65: { text: "強い雨", icon: "???" },
            71: { text: "弱い雪", icon: "???" },
            73: { text: "雪", icon: "??" },
            75: { text: "強い雪", icon: "??" },
            77: { text: "雪", icon: "??" },
            80: { text: "にわか雨", icon: "???" },
            81: { text: "にわか雨", icon: "???" },
            82: { text: "強いにわか雨", icon: "??" },
            85: { text: "にわか雪", icon: "???" },
            86: { text: "強いにわか雪", icon: "??" },
            95: { text: "雷雨", icon: "??" },
            96: { text: "雷雨", icon: "??" },
            99: { text: "強い雷雨", icon: "??" }
        };

        async function searchWeather() {
            const cityName = cityInput.value.trim();

            message.textContent = "";
            weatherCard.classList.remove("show");

            if (cityName === "") {
                message.textContent = "都市名を入力してください。";
                return;
            }

            try {
                searchButton.disabled = true;
                searchButton.textContent = "検索中";

                const geoUrl =
                    "https://geocoding-api.open-meteo.com/v1/search?name=" +
                    encodeURIComponent(cityName) +
                    "&count=1&language=ja&format=json";

                const geoResponse = await fetch(geoUrl);
                if (!geoResponse.ok) {
                    throw new Error("地名検索失敗");
                }

                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    message.textContent = "都市が見つかりませんでした。";
                    return;
                }

                const location = geoData.results[0];
                const latitude = location.latitude;
                const longitude = location.longitude;

                const weatherUrl =
                    "https://api.open-meteo.com/v1/forecast" +
                    "?latitude=" + encodeURIComponent(latitude) +
                    "&longitude=" + encodeURIComponent(longitude) +
                    "&current=temperature_2m,weather_code,wind_speed_10m" +
                    "&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max" +
                    "&timezone=auto";

                const weatherResponse = await fetch(weatherUrl);
                if (!weatherResponse.ok) {
                    throw new Error("天気取得失敗");
                }

                const weatherData = await weatherResponse.json();
                const current = weatherData.current;
                const daily = weatherData.daily;

                locationName.textContent = location.name || cityName;

                let subText = "";
                if (location.admin1) {
                    subText += location.admin1;
                }
                if (location.country) {
                    subText += (subText ? " / " : "") + location.country;
                }
                locationSub.textContent = subText || "-";

                const weatherInfo = weatherMap[current.weather_code] || { text: "不明", icon: "??" };

                weatherIcon.textContent = weatherInfo.icon;
                weatherText.textContent = weatherInfo.text;
                temp.textContent = Math.round(current.temperature_2m) + "°";
                timeText.textContent = "観測時刻: " + (current.time || "-");
                tempMax.textContent = Math.round(daily.temperature_2m_max[0]) + "°C";
                tempMin.textContent = Math.round(daily.temperature_2m_min[0]) + "°C";
                rainChance.textContent = (daily.precipitation_probability_max[0] ?? "-") + "%";
                windSpeed.textContent = Math.round(current.wind_speed_10m) + " km/h";

                weatherCard.classList.add("show");
            } catch (error) {
                console.error(error);
                message.textContent = "エラーが発生しました。時間をおいて再度お試しください。";
            } finally {
                searchButton.disabled = false;
                searchButton.textContent = "検索";
            }
        }

        searchButton.addEventListener("click", searchWeather);

        cityInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                searchWeather();
            }
        });

        cityInput.value = "福岡市";
        searchWeather();
    </script>
</body>
</html>
